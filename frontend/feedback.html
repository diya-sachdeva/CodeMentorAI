<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback — CodeMentor AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    .feedback-hero {
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 40px 0 32px;
      flex-wrap: wrap;
    }

    .score-circle {
      flex-shrink: 0;
      width: 120px; height: 120px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--accent);
      background: var(--accent-dim);
    }

    .score-circle__number {
      font-family: var(--font-mono);
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-circle__label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .section { margin-bottom: 24px; }

    .section-head {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .eval-grid-6 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }

    .eval-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .eval-item__label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .eval-item__value {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .eval-item__explanation {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-top: 6px;
    }

    .follow-up-question {
      background: var(--accent-dim);
      border: 1px solid rgba(124,106,255,0.3);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 16px 20px;
      font-size: 0.92rem;
      color: var(--accent);
      line-height: 1.7;
      font-style: italic;
    }

    .follow-up-input-area {
      border: 1px solid rgba(124,106,255,0.3);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
    }

    .follow-up-input-area textarea {
      width: 100%;
      background: var(--bg);
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 0.9rem;
      line-height: 1.7;
      padding: 14px 18px;
      resize: vertical;
      min-height: 90px;
      outline: none;
      display: block;
    }

    .follow-up-input-area textarea:focus {
      border-bottom-color: var(--accent);
      background: var(--bg-card);
    }

    .follow-up-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg-card);
    }

    .follow-up-feedback {
      margin-top: 12px;
      padding: 16px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: var(--radius);
      font-size: 0.9rem;
      color: var(--text-primary);
      line-height: 1.7;
      display: none;
    }

    .your-answer-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 18px 20px;
      font-size: 0.88rem;
      line-height: 1.8;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }

    .action-row {
      display: flex;
      gap: 12px;
      padding: 40px 0;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .eval-grid-6 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav__inner">
      <a href="/dashboard" class="nav__logo"><span>&gt;_</span> CodeMentor AI</a>
      <ul class="nav__links">
        <li><a href="/history">History</a></li>
        <li><a href="/dashboard" class="btn btn--ghost" style="padding:7px 14px;">Dashboard</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">

      <div id="no-data" class="empty-state" style="display:none;">
        <h3>No feedback found</h3>
        <p>Complete an interview first.</p>
        <a href="/interview" class="btn btn--primary" style="margin-top:16px;">Start interview</a>
      </div>

      <div id="content" style="display:none;">

        <!-- Score + headline -->
        <div class="feedback-hero">
          <div class="score-circle" id="score-circle">
            <div class="score-circle__number" id="score-num">—</div>
            <div class="score-circle__label">/ 100</div>
          </div>
          <div>
            <h1 id="correctness-headline">—</h1>
            <p id="correctness-explanation" style="margin-top: 8px; max-width: 500px; line-height: 1.7;">—</p>
          </div>
        </div>

        <!-- 6-dimension breakdown -->
        <div class="section">
          <div class="section-head">Detailed breakdown</div>
          <div class="eval-grid-6" id="eval-grid"></div>
        </div>

        <hr class="divider" />

        <!-- Optimal solution -->
        <div class="section">
          <div class="section-head">Optimal approach</div>
          <div class="card">
            <p id="optimal-solution" style="color: var(--text-primary); line-height: 1.8;"></p>
          </div>
        </div>

        <!-- Overall feedback -->
        <div class="section">
          <div class="section-head">Interviewer feedback</div>
          <div class="card" style="border-left: 3px solid var(--accent);">
            <p id="overall-feedback" style="color: var(--text-primary); line-height: 1.8;"></p>
          </div>
        </div>

        <!-- Follow-up -->
        <div class="section">
          <div class="section-head">Follow-up question</div>
          <div class="follow-up-question" id="follow-up-q"></div>
          <div class="follow-up-input-area">
            <textarea id="follow-up-input" placeholder="Answer the follow-up question here…"></textarea>
            <div class="follow-up-footer">
              <span style="font-size:0.78rem; color:var(--text-muted);">Optional — practice answering follow-ups too</span>
              <button class="btn btn--primary" id="fu-btn" onclick="submitFollowUp()" style="padding: 8px 16px;">
                Get feedback
              </button>
            </div>
          </div>
          <div class="follow-up-feedback" id="follow-up-feedback"></div>
        </div>

        <!-- Your answer -->
        <div class="section">
          <div class="section-head">Your explanation</div>
          <div class="your-answer-box" id="your-answer"></div>
        </div>

        <div class="action-row">
          <a href="/interview" class="btn btn--primary btn--lg">Practice again</a>
          <a href="/dashboard" class="btn btn--ghost btn--lg">← Dashboard</a>
          <a href="/history"   class="btn btn--ghost btn--lg">History</a>
        </div>

      </div>
    </div>
  </main>

  <div id="toast"></div>
  <script src="/static/js/main.js"></script>
  <script>
    requireAuth();

    const raw = sessionStorage.getItem("feedback");
    let followUpQuestion = "";

    if (!raw) {
      document.getElementById("no-data").style.display = "block";
    } else {
      const data = JSON.parse(raw);
      const ev   = data.evaluation;
      followUpQuestion = ev.follow_up || "";

      document.getElementById("content").style.display = "block";

      // Score circle
      const color = scoreColor(ev.score);
      const circle = document.getElementById("score-circle");
      circle.style.borderColor = color;
      circle.style.background  = color + "22";
      const numEl = document.getElementById("score-num");
      numEl.style.color = color;
      numEl.textContent = ev.score;

      // Headline
      const headlines = {
        Excellent: "Excellent explanation 🎉",
        Good:      "Good approach ✓",
        Partial:   "Partially correct",
        Incorrect: "Needs improvement"
      };
      document.getElementById("correctness-headline").textContent =
        headlines[ev.correctness] || ev.correctness;
      document.getElementById("correctness-explanation").textContent =
        ev.correctness_explanation;

      // 6-dimension grid
      document.getElementById("eval-grid").innerHTML = `
        <div class="eval-item">
          <div class="eval-item__label">Time Complexity</div>
          <div class="eval-item__value">${ev.time_complexity || "—"}</div>
          <div class="eval-item__explanation">${assessmentBadge(ev.time_complexity_assessment)}</div>
        </div>
        <div class="eval-item">
          <div class="eval-item__label">Space Complexity</div>
          <div class="eval-item__value">${ev.space_complexity || "—"}</div>
          <div class="eval-item__explanation">${assessmentBadge(ev.space_complexity_assessment)}</div>
        </div>
        <div class="eval-item">
          <div class="eval-item__label">Edge Cases</div>
          <div class="eval-item__value">${assessmentBadge(ev.edge_cases_handled)}</div>
          <div class="eval-item__explanation">${ev.edge_cases_explanation || ""}</div>
        </div>
        <div class="eval-item">
          <div class="eval-item__label">Communication</div>
          <div class="eval-item__value">${assessmentBadge(ev.communication)}</div>
          <div class="eval-item__explanation">${ev.communication_explanation || ""}</div>
        </div>
        <div class="eval-item">
          <div class="eval-item__label">Correctness</div>
          <div class="eval-item__value">${assessmentBadge(ev.correctness)}</div>
          <div class="eval-item__explanation">${ev.correctness_explanation?.split(".")[0] || ""}</div>
        </div>
        <div class="eval-item">
          <div class="eval-item__label">Overall Score</div>
          <div class="eval-item__value" style="color:${color}; font-size:1.3rem;">${ev.score}<span style="font-size:0.75rem; color:var(--text-muted);">/100</span></div>
        </div>
      `;

      document.getElementById("optimal-solution").textContent  = ev.optimal_solution;
      document.getElementById("overall-feedback").textContent  = ev.overall_feedback;
      document.getElementById("follow-up-q").textContent       = followUpQuestion;
      document.getElementById("your-answer").textContent       = sessionStorage.getItem("last_answer") || "—";
    }

    async function submitFollowUp() {
      const answer = document.getElementById("follow-up-input").value.trim();
      if (answer.split(/\s+/).filter(Boolean).length < 5) {
        showToast("Write a bit more before submitting.", "error");
        return;
      }

      const btn = document.getElementById("fu-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await api("POST", "/api/followup", {
          question: followUpQuestion,
          answer
        });
        const el = document.getElementById("follow-up-feedback");
        el.textContent = res.feedback;
        el.style.display = "block";
        el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        showToast("Follow-up evaluated!", "success");
      } catch (err) {
        showToast(err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Get feedback";
      }
    }
  </script>
</body>
</html>
